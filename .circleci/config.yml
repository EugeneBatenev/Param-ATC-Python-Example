version: 2.1

parameters:
  ALLURE_JOB_RUN_ID:
    type: string
    default: ""
  ALLURE_USERNAME:
    type: string
    default: ""

jobs:
  test:
    docker:
      - image: cimg/python:3.12
    working_directory: ~/repo
    environment:
      ALLURE_RESULTS: allure-results
      ALLURE_JOB_RUN_ID: << pipeline.parameters.ALLURE_JOB_RUN_ID >>
      ALLURE_USERNAME: << pipeline.parameters.ALLURE_USERNAME >>
      ALLURE_ENDPOINT: https://testing.testops.cloud/
      ALLURE_PROJECT_ID: 15128
    steps:
      - checkout
      - run:
          name: Install test dependencies
          command: python -m pip install --upgrade pip pytest allure-pytest
      - run:
          name: Download allurectl
          command: curl -fsSL https://github.com/allure-framework/allurectl/releases/latest/download/allurectl_linux_amd64 -o allurectl && chmod +x allurectl
      - run:
          name: Run tests and upload results to Allure TestOps
          command: |
            ./allurectl watch -- python -m pytest --alluredir "$ALLURE_RESULTS" --clean-alluredir

workflows:
  test:
    jobs:
      - test
