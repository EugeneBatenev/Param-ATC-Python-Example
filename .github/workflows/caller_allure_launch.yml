name: initial launch

on:
  workflow_dispatch:
    inputs:
      ALLURE_JOB_RUN_ID:
        description: "ALLURE_JOB_RUN_ID service parameter. Leave blank."
        required: false
      ALLURE_USERNAME:
        description: "ALLURE_USERNAME service parameter. Leave blank"
        required: false

steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - uses: actions/github-script@v4
        id: allure-job-uid
        with:
          result-encoding: string
          script: |
            const result = await github.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });
            return `${context.repo.owner}/${context.repo.repo}/actions/workflows/${result.data.workflow_id}`

      - name: Download and make allurectl executable
        run: |
          wget https://github.com/allure-framework/allurectl/releases/latest/download/allurectl_linux_amd64 -O ./allurectl
          chmod +x ./allurectl

      - name: Pack Allure pipeline context
        id: allure-context
        env:
          ALLURE_JOB_UID: ${{ steps.allure-job-uid.outputs.result }}
        run: |
          echo "ALLURE_CI_ENV=$(./allurectl ci env --encode)" >> "$GITHUB_ENV"

run-name: "${{ github.workflow }}-${{ github.run_number }}"

jobs:
  execute-functional-test:
    name: execute functional test
    uses: ./.github/workflows/reusable_python_test_automation.yml
    with:
      ALLURE_JOB_RUN_ID: ${{ github.event.inputs.ALLURE_JOB_RUN_ID }}
      ALLURE_USERNAME: ${{ github.event.inputs.ALLURE_USERNAME }}
    secrets:
      ALLURE_TOKEN: ${{ secrets.ALLURE_TOKEN }}
